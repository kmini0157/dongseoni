<style>
:root{
  --bg:#0a0e17;--card:rgba(22,31,49,.82);--card-s:rgba(28,39,64,.9);
  --line:rgba(255,255,255,.10);--line2:rgba(255,255,255,.18);

  --danger:#ff7a7a;--danger-bg:rgba(255,122,122,.14);--rain:#7cb6ff;--rain-bg:rgba(124,182,255,.16);
  --r:14px;--r-lg:20px;--r-sm:10px;--max:440px;--safe-b:env(safe-area-inset-bottom,0px);--safe-t:env(safe-area-inset-top,0px);--safe-l:env(safe-area-inset-left,0px);--safe-r:env(safe-area-inset-right,0px);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{font-family:'Pretendard',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--tx);-webkit-font-smoothing:antialiased;line-height:1.5;overscroll-behavior-y:none;-webkit-text-size-adjust:100%;text-size-adjust:100%}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit}
.sky{position:fixed;inset:0;z-index:0;transition:background 1.1s ease;background:var(--bg);overflow:hidden}
.sky.clear{background:linear-gradient(180deg,#2056a0 0%,#163058 42%,#0a0e17 78%)}
.sky.cloud{background:linear-gradient(180deg,#37475a 0%,#1b2433 48%,#0a0e17 82%)}
.sky.rain{background:linear-gradient(180deg,#1d3a59 0%,#132640 48%,#080c14 84%)}
.sky.night{background:linear-gradient(180deg,#2a2156 0%,#171436 42%,#080a14 82%)}
.sky .fx{position:absolute;inset:0}
.drop{position:absolute;top:-12%;width:2px;height:16px;border-radius:2px;background:linear-gradient(transparent,rgba(150,195,255,.75));animation:fall linear infinite}
.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle ease-in-out infinite}
.cloud{position:absolute;border-radius:50%;background:rgba(255,255,255,.07);filter:blur(14px);animation:drift ease-in-out infinite alternate}
.sun{position:absolute;top:-46px;right:-30px;width:190px;height:190px;border-radius:50%;background:radial-gradient(circle,rgba(255,214,120,.55),rgba(255,214,120,0) 68%);animation:sunpulse 5s ease-in-out infinite}
.moon{position:absolute;top:26px;right:30px;width:120px;height:120px;border-radius:50%;background:radial-gradient(circle,rgba(210,220,255,.32),rgba(210,220,255,0) 66%)}
@keyframes fall{to{transform:translateY(118vh)}}@keyframes twinkle{0%,100%{opacity:.2}50%{opacity:1}}
@keyframes drift{from{transform:translateX(-22px)}to{transform:translateX(22px)}}@keyframes sunpulse{0%,100%{opacity:.55;transform:scale(1)}50%{opacity:.85;transform:scale(1.07)}}
.app{position:relative;z-index:1;max-width:var(--max);margin:0 auto;min-height:100dvh;background:transparent;padding-top:var(--safe-t);padding-left:var(--safe-l);padding-right:var(--safe-r);padding-bottom:calc(80px + var(--safe-b))}
.entering .anim1{animation:fadeUp .5s cubic-bezier(.2,.7,.3,1) both}
.entering .card{animation:fadeUp .55s cubic-bezier(.2,.7,.3,1) both .05s}
.entering .tl-item{animation:fadeUp .5s cubic-bezier(.2,.7,.3,1) both}
.entering .tl-item:nth-child(2){animation-delay:.04s}.entering .tl-item:nth-child(3){animation-delay:.08s}
.entering .tl-item:nth-child(4){animation-delay:.12s}.entering .tl-item:nth-child(5){animation-delay:.16s}.entering .tl-item:nth-child(n+6){animation-delay:.2s}

@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.destbar{padding:10px 14px 0;display:flex;align-items:center;gap:8px}
.destbtn{display:inline-flex;align-items:center;gap:6px;font-size:14px;font-weight:700;background:rgba(255,255,255,.12);border:1px solid var(--line2);border-radius:999px;padding:8px 15px;color:var(--tx);backdrop-filter:blur(4px)}

.modesel{display:flex;gap:4px;margin-left:auto}

.modesel button.on{background:var(--accent);border-color:var(--accent)}
.days{display:flex;gap:8px;overflow-x:auto;padding:10px 14px 0}.days::-webkit-scrollbar{display:none}
.day-chip{flex:none;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:7px 13px;color:var(--tx2);font-size:13px;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:1px;backdrop-filter:blur(6px)}
.day-chip small{font-weight:400;font-size:10px;color:var(--tx3)}
.day-chip.on{background:var(--accent);border-color:var(--accent);color:#fff}.day-chip.on small{color:rgba(255,255,255,.85)}
.mood{padding:8px 18px 6px;background:linear-gradient(180deg,rgba(8,12,20,.18),transparent)}
.statusbar{display:flex;align-items:center;justify-content:space-between;gap:8px}
.pill{font-size:12px;background:rgba(255,255,255,.12);border-radius:999px;padding:4px 11px;white-space:nowrap;backdrop-filter:blur(4px)}

.hero{display:flex;flex-direction:column;align-items:center;padding:6px 0 2px}

.clock{margin-top:8px;text-align:center}

.clock .d{font-size:13px;color:#b9c7de;margin-top:4px}
.mascot{width:104px;height:118px;display:block;overflow:visible;animation:pop .55s cubic-bezier(.2,1.5,.4,1) both}
.mascot.mini{width:52px;height:60px}
.mascot .body{animation:floaty 3.4s ease-in-out infinite;transform-box:fill-box;transform-origin:50% 100%}
.mascot.walk .body{animation:walk .52s ease-in-out infinite}
.mascot .eyes{animation:blink 4.4s infinite;transform-box:fill-box;transform-origin:50% 50%}
.mascot .needle{animation:spin 7s linear infinite;transform-box:fill-box;transform-origin:50% 50%}
.mascot .umb{animation:sway 2.8s ease-in-out infinite;transform-box:fill-box;transform-origin:50% 92%}
.mascot .spark{animation:tw 1.9s ease-in-out infinite;transform-box:fill-box;transform-origin:50% 50%}.mascot .spark.b{animation-delay:.7s}
.mascot .heart{animation:hb .9s ease-in-out infinite;transform-box:fill-box;transform-origin:50% 50%}
.mascot .drool{animation:drip 2.2s ease-in-out infinite}.mascot .zzz{animation:rise 3s ease-in-out infinite}
@keyframes pop{0%{opacity:0;transform:scale(.2) translateY(14px)}100%{opacity:1;transform:scale(1) translateY(0)}}
@keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}@keyframes walk{0%,100%{transform:rotate(-6deg)}50%{transform:rotate(6deg)}}
@keyframes blink{0%,90%,100%{transform:scaleY(1)}95%{transform:scaleY(.1)}}@keyframes spin{to{transform:rotate(360deg)}}
@keyframes sway{0%,100%{transform:rotate(-8deg)}50%{transform:rotate(8deg)}}@keyframes tw{0%,100%{opacity:.3;transform:scale(.6)}50%{opacity:1;transform:scale(1.15)}}
@keyframes hb{0%,100%{transform:scale(1)}50%{transform:scale(1.18)}}@keyframes drip{0%,55%{transform:translateY(0);opacity:.9}80%{transform:translateY(4px);opacity:1}100%{transform:translateY(8px);opacity:0}}
@keyframes rise{0%{opacity:0;transform:translateY(6px)}40%{opacity:1}100%{opacity:0;transform:translateY(-14px)}}
.m-aura{display:inline-block;position:relative}
.m-aura::before{content:"";position:absolute;inset:-16px;border-radius:50%;z-index:-1;background:radial-gradient(circle,var(--g,rgba(90,147,255,.5)),transparent 62%);animation:auraPulse 3.2s ease-in-out infinite}
@keyframes auraPulse{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:.85;transform:scale(1.1)}}
.banner{margin:10px 14px 0;border-radius:var(--r);padding:11px 13px;display:flex;align-items:center;gap:10px;font-size:13px;animation:bannerIn .45s cubic-bezier(.2,.8,.3,1) both;backdrop-filter:blur(6px)}
.banner.rain{background:var(--rain-bg);color:#d6e8ff;border:1px solid rgba(124,182,255,.25)}
.banner.warn{background:var(--warn-bg);color:#ffdca6;border:1px solid rgba(255,191,94,.25)}
@keyframes bannerIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.banner .ic{font-size:18px;flex:none}.banner .msg{flex:1;line-height:1.4}
.banner .act{font-size:12px;font-weight:600;border:1px solid var(--line2);border-radius:var(--r-sm);padding:6px 11px;white-space:nowrap;background:rgba(255,255,255,.08)}
.wrap{padding:14px}
.chip{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--tx2);background:rgba(255,255,255,.06);border:1px solid var(--line);border-radius:999px;padding:5px 11px}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r-lg);padding:16px;backdrop-filter:blur(10px);box-shadow:0 8px 30px rgba(0,0,0,.28)}
.now-place{font-size:25px;font-weight:700;letter-spacing:-.4px}.now-sub{font-size:13px;color:var(--tx2);margin-top:3px}

.verify{display:flex;align-items:center;gap:6px;margin-top:10px;font-size:12px;color:var(--tx3)}.verify a{color:var(--accent)}
.count{margin-top:15px;padding-top:14px;border-top:1px solid var(--line);display:flex;align-items:baseline;justify-content:space-between}

.nextrow{margin-top:11px;display:flex;align-items:center;justify-content:space-between;font-size:12px;gap:8px}.nextrow .l{display:flex;align-items:center;gap:6px;color:var(--tx2)}
.arrive-btn{width:100%;margin-top:12px;height:44px;border-radius:var(--r);background:rgba(255,255,255,.06);border:1px dashed var(--line2);color:var(--tx);font-size:14px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:7px;transition:transform .08s}
.arrive-btn:active{transform:scale(.98);background:rgba(90,147,255,.14)}
.cta-row{display:flex;gap:10px;margin-top:14px}
.cta{flex:1;height:52px;border-radius:var(--r);background:linear-gradient(135deg,#5a93ff,#3f78ee);color:#fff;font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 6px 20px rgba(63,120,238,.35);transition:transform .08s}
.cta:active{transform:scale(.97)}
.cta.ghost{flex:none;width:52px;background:var(--card-s);color:var(--tx2);border:1px solid var(--line);box-shadow:none}
.cta.sos{flex:none;width:52px;background:var(--card-s);color:var(--danger);border:1px solid var(--line);box-shadow:none}
.sim{margin:14px;padding:12px 15px;background:var(--card);border:1px solid var(--line);border-radius:var(--r);backdrop-filter:blur(8px)}
.sim .top{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--tx2);margin-bottom:9px}
.sim input[type=range]{width:100%;accent-color:var(--accent)}.sim .live{font-weight:700;color:var(--accent)}
.region-h{display:flex;align-items:center;gap:8px;margin:18px 2px 8px;font-size:13px;color:var(--tx2);font-weight:600}.region-h::after{content:"";flex:1;height:1px;background:var(--line)}
.tl-item{display:flex;gap:12px;margin-bottom:10px}
.tl-time{flex:none;width:46px;text-align:right;font-size:13px;font-weight:700;color:var(--tx);padding-top:14px}.tl-time small{display:block;font-weight:400;color:var(--tx3);font-size:11px}
.tl-body{flex:1;background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:12px 13px;backdrop-filter:blur(8px)}

.tl-name{font-size:15px;font-weight:600;display:flex;align-items:center;gap:7px}
.tl-meta{font-size:12px;color:var(--tx2);margin-top:4px;display:flex;flex-wrap:wrap;gap:8px}
.tl-acts{display:flex;gap:6px;margin-top:10px}

.tl-acts button.go{color:#d6e8ff;border-color:var(--accent-d);background:rgba(90,147,255,.14)}
.move{display:flex;flex-direction:column;gap:4px;justify-content:center}
.move button{width:30px;height:24px;background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:7px;color:var(--tx2);font-size:13px;display:flex;align-items:center;justify-content:center}.move button:active{background:var(--accent);color:#fff}
.travel{font-size:11px;color:var(--tx3);margin:0 0 10px 58px;display:flex;align-items:center;gap:6px}.travel .ln{width:14px;height:1px;background:var(--line2)}
.sec-title{font-size:16px;font-weight:700;margin:20px 2px 10px;display:flex;align-items:center;gap:8px}
.sec-title::before{content:"";width:3px;height:15px;border-radius:2px;background:var(--accent);flex:none}
.starrow{display:flex;gap:4px}.starrow button{font-size:32px;background:none;border:0;cursor:pointer;padding:2px 6px;line-height:1;transition:transform .12s}.starrow button:active{transform:scale(1.25)}
.tl-note{font-size:12px;color:var(--tx3);margin-top:3px;font-style:italic}
.field{margin-bottom:12px}.field label{display:block;font-size:12px;color:var(--tx2);margin-bottom:6px}
.input,select.input{width:100%;min-width:0;max-width:100%;height:44px;background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:var(--r-sm);color:var(--tx);padding:0 13px;font-size:15px}

input.input::-webkit-calendar-picker-indicator{margin-left:auto;opacity:.5;filter:invert(.85);cursor:pointer}
.suggest{position:absolute;left:0;right:0;top:100%;z-index:30;background:var(--card-s);border:1px solid var(--line2);border-radius:10px;margin-top:4px;overflow:hidden;box-shadow:0 12px 32px rgba(0,0,0,.45)}

.input:focus{outline:none;border-color:var(--accent)}

.row2{display:flex;gap:10px}.row2>*{flex:1;min-width:0}
.checks{display:flex;flex-wrap:wrap;gap:7px}

.btn{height:48px;border-radius:var(--r);font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:7px;transition:transform .08s}.btn:active{transform:scale(.98)}

.btn.line{background:rgba(255,255,255,.05);border:1px solid var(--line2);color:var(--tx);width:100%}

function ensureDays(t){ if(!t||typeof t!=="object") return t;
  if(!Array.isArray(t.days)||!t.days.length) t.days=[{start:"10:00",stay:null,places:[]}];
  t.days.forEach(d=>{ if(!d||typeof d!=="object") return; if(!Array.isArray(d.places)) d.places=[]; d.places=d.places.filter(pl=>pl&&typeof pl==="object"); d.places.forEach(pl=>{ cleanNode(pl); if(!TYPE_META[pl.type]) pl.type="see"; }); if(d.stay) cleanNode(d.stay); });

  if(off<0||off>=daysCount()){ navigator.clearAppBadge&&navigator.clearAppBadge(); return; }

/* ---------- 이동시간(좌표 기반 + 부산보정 + ODsay) ---------- */
function ck(n){ return (n.lat||0).toFixed(3)+","+(n.lng||0).toFixed(3); }
function busanT(a,b){ if(BUSAN_T[a+"|"+b]!=null) return BUSAN_T[a+"|"+b]; if(BUSAN_T[b+"|"+a]!=null) return BUSAN_T[b+"|"+a]; return null; }
const OSRMCACHE={}, osrmPending={};
function fetchOSRM(a,b,k){ osrmPending[k]=true;
  const ctl=new AbortController(), to=setTimeout(()=>ctl.abort(),8000);
  fetch(`https://router.project-osrm.org/route/v1/driving/${a.lng},${a.lat};${b.lng},${b.lat}?overview=false`,{signal:ctl.signal})
    .then(r=>r.json()).then(j=>{ if(j&&j.code==="Ok"&&j.routes&&j.routes[0]){ OSRMCACHE[k]={dist:j.routes[0].distance/1000, car:Math.round(j.routes[0].duration/60)};
      clearTimeout(odRenderT); odRenderT=setTimeout(()=>{ if(document.getElementById("app")){ if(screen==="home") applySim(); else if(screen==="timeline") render(); } },150); } })
    .catch(()=>{}).finally(()=>{ clearTimeout(to); delete osrmPending[k]; });
}
function transit(a,b){
  if(!a||!b) return 0; const mode=(TRIP&&TRIP.mode)||"transit", M=MODES[mode];
  if(a.area===b.area && a.city===b.city) return M.same;
  if(!(a.lat&&b.lat)) return 30;
  const k=ck(a)+">"+ck(b), k2=ck(b)+">"+ck(a), O=OSRMCACHE[k]||OSRMCACHE[k2];
  if(!O && !osrmPending[k] && !osrmPending[k2]) fetchOSRM(a,b,k);   // 도로거리·자동차시간 실측(모드 공용)
  if(mode==="transit"){
    if(ODCACHE[k]!=null) return ODCACHE[k]; if(ODCACHE[k2]!=null) return ODCACHE[k2];
    if(ODSAY_KEY && OD_OK!==false && !odPending[k]){ odPending[k]=true; fetchOdsay(a,b,k); }
    if(a.city==="부산"&&b.city==="부산"){ const t=busanT(a.area,b.area); if(t!=null) return t; }
  }
  if(mode==="car" && O){ const km=O.dist, sp=(km<6?20:km<15?28:km<40?42:65); return Math.max(M.minT, Math.round(km/sp*60)+4); }   // 실제 도로거리 ÷ 한국 도심 평균속도(혼잡 반영). OSRM 무혼잡 시간은 2~4배 과소라 미사용
  if(mode==="walk" && O) return Math.max(M.minT, Math.round(O.dist/M.spd*60) + M.buf);   // 실측 도로거리 ÷ 도보속도
  const km = O ? O.dist : haversine(a,b);   // OSRM 도로거리 있으면 우회율 불필요
  const det = O ? 1.0 : (km>25?M.det*0.85:M.det); let spd=M.spd;
  if(mode==="transit") spd = km>30?60:(km>8?35:M.spd);
  else if(mode==="car") spd = km>30?70:(km>8?45:M.spd);
  return Math.max(M.minT, Math.round(km*det/spd*60)+M.buf);
}
function transitSrc(a,b){   // 이 이동시간의 출처(실측/부산권/도로/추정)
  if(!a||!b||(a.area===b.area&&a.city===b.city)) return "est";
  const mode=(TRIP&&TRIP.mode)||"transit"; if(!(a.lat&&b.lat)) return "est";
  const k=ck(a)+">"+ck(b),k2=ck(b)+">"+ck(a), O=OSRMCACHE[k]||OSRMCACHE[k2];
  if(mode==="transit"){ if(ODCACHE[k]!=null||ODCACHE[k2]!=null) return "odsay";
    if(a.city==="부산"&&b.city==="부산"&&busanT(a.area,b.area)!=null) return "busan"; return "est"; }
  if(mode==="car"&&O) return "road";    // 도로기반(실거리+도심 평균속도)
  if(mode==="walk"&&O) return "road";   // 도로기반
  return "est";
}
function odsayUrl(sLat,sLng,eLat,eLng){ return `https://api.odsay.com/v1/api/searchPubTransPath?SX=${sLng}&SY=${sLat}&EX=${eLng}&EY=${eLat}&apiKey=${encodeURIComponent(ODSAY_KEY)}`; }
let odRenderT=null;
async function fetchOdsay(a,b,k){
  const ctl=new AbortController(), to=setTimeout(()=>ctl.abort(),9000);
  try{ const r=await fetch(odsayUrl(a.lat,a.lng,b.lat,b.lng),{signal:ctl.signal}); const j=await r.json(); const t=j&&j.result&&j.result.path&&j.result.path[0]&&j.result.path[0].info&&j.result.path[0].info.totalTime;
    if(t){ OD_OK=true; ODCACHE[k]=t+8; clearTimeout(odRenderT); odRenderT=setTimeout(()=>{ if(document.getElementById("app")){ if(screen==="home") applySim(); else if(screen==="timeline") render(); } },150); } }
  catch(e){ /* 개별 경로 실패는 전역 OD_OK를 끄지 않음 — 그 경로만 추정 폴백 */ }
  finally{ clearTimeout(to); delete odPending[k]; }

async function probeOdsay(){   // 부팅 1회: ODsay 브라우저 직접호출(CORS)이 되는지 확정

/* ---------- 스케줄(하루) ---------- */
function buildSteps(di){
  di=(di==null)?curDay:di; const day=TRIP&&TRIP.days[di]; if(!day) return [];
  const steps=[]; let cur=hmToMin(day.start)??600;
  let prev = di>0 ? TRIP.days[di-1].stay : (TRIP.arrival||null);
  if(di===0 && TRIP.arrival){ const t=hmToMin(TRIP.arrival.time)??cur; cur=Math.max(cur,t);
    steps.push({kind:"air",name:TRIP.arrival.name||"도착",area:TRIP.arrival.area,city:TRIP.arrival.city,lat:TRIP.arrival.lat,lng:TRIP.arrival.lng,arrive:t,depart:cur,place:null}); prev=TRIP.arrival; }
  day.places.forEach(p=>{ const tv=transit(prev,p), tsr=transitSrc(prev,p); const need=cur+tv; let arrive=need, fixed=false;
    if(p.anchor){ const a=hmToMin(p.anchor); if(a!=null){ arrive=a; fixed=true; } }   // 사용자가 고정한 도착시각 = 무조건 적용
    else { const an=effAnchor(p); if(an){ const a=hmToMin(an); if(a!=null&&a>arrive) arrive=a; } }   // 끼니 기본 = 부드러운 하한
    const dur=p.dur??TYPE_META[p.type]?.dur??60; const depart=arrive+dur;
    steps.push({kind:"place",place:p,name:p.name,area:p.area,city:p.city,lat:p.lat,lng:p.lng,travel:tv,travelSrc:tsr,arrive,depart,gap:arrive-need,fixed}); cur=depart; prev=p; });
  if(day.stay){ const tv=transit(prev,day.stay), tsr=transitSrc(prev,day.stay); steps.push({kind:"stay",name:day.stay.name||"숙소",area:day.stay.area,city:day.stay.city,lat:day.stay.lat,lng:day.stay.lng,travel:tv,travelSrc:tsr,arrive:cur+tv,depart:cur+tv}); }
  return steps;
}
function bizStatus(p,atMin,dateStr){ const h=p.hours||{}; const dow=new Date((dateStr||curDate())+"T00:00:00").getDay();
  if((h.closed||[]).includes(dow)) return {k:"danger",t:"휴무일"};
  const br0=hmToMin(h.breakStart),br1=hmToMin(h.breakEnd); if(br0!=null&&br1!=null&&atMin>=br0&&atMin<br1) return {k:"warn",t:"브레이크타임"};
  const lo=hmToMin(h.lastOrder); if(lo!=null){ if(atMin>lo) return {k:"danger",t:"라스트오더 지남"}; if(lo-atMin<=30) return {k:"warn",t:"마감임박 LO "+h.lastOrder}; return {k:"ok",t:"영업 중 · LO "+h.lastOrder}; }
  return {k:"ok",t:"영업 중"}; }

/* ---------- 날씨(좌표별 캐시) ---------- */
function wxKey(lat,lng){ return (+lat).toFixed(2)+","+(+lng).toFixed(2); }
function dayCoords(di){ const day=TRIP.days[di];
  if(di===0&&TRIP.arrival&&TRIP.arrival.lat) return {lat:TRIP.arrival.lat,lng:TRIP.arrival.lng};
  const p=day&&day.places.find(x=>x.lat); if(p) return {lat:p.lat,lng:p.lng};
  if(day&&day.stay&&day.stay.lat) return {lat:day.stay.lat,lng:day.stay.lng};
  const c=cityObj(); return {lat:c.lat,lng:c.lng}; }
function curWX(){ const c=dayCoords(curDay); return WXCACHE[wxKey(c.lat,c.lng)]||null; }
async function ensureWeather(lat,lng){ const k=wxKey(lat,lng); if(WXCACHE[k]) return WXCACHE[k];
  const ls=localStorage.getItem("dongseoni_wx_"+k); if(ls){ try{ const o=JSON.parse(ls); if(Date.now()-o.ts<3600000){ WXCACHE[k]=o.data; return o.data; } }catch(e){} }
  try{ const fd=Math.min(16,Math.max(4,daysCount()+2));
    const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&hourly=precipitation_probability,temperature_2m,weather_code&daily=sunrise,sunset&timezone=Asia%2FSeoul&forecast_days=${fd}`); const j=await r.json();
    const data={time:j.hourly.time,pop:j.hourly.precipitation_probability,temp:j.hourly.temperature_2m,code:j.hourly.weather_code,sun:(j.daily?{date:j.daily.time,rise:j.daily.sunrise,set:j.daily.sunset}:null)};
    WXCACHE[k]=data; wxPersist(k,data); return data; }catch(e){ return null; } }
function wxPersist(k,data){ try{ localStorage.setItem("dongseoni_wx_"+k,JSON.stringify({ts:Date.now(),data})); }
  catch(e){ try{ Object.keys(localStorage).filter(x=>x.indexOf("dongseoni_wx_")===0).map(x=>{let t=0;try{t=JSON.parse(localStorage.getItem(x)).ts||0;}catch(_){} return [x,t];}).sort((p,q)=>p[1]-q[1]).slice(0,5).forEach(p=>localStorage.removeItem(p[0])); localStorage.setItem("dongseoni_wx_"+k,JSON.stringify({ts:Date.now(),data})); }catch(_){} } }
function wxAt(dateStr,atMin){ const W=curWX(); if(!W) return null;
  const off=Math.floor(atMin/1440); let ds=dateStr; if(off>0){ const d=new Date(dateStr+"T00:00:00"); d.setDate(d.getDate()+off); ds=ymdLocal(d); }
  const key=ds+"T"+minToHM(atMin).slice(0,2)+":00"; const i=W.time.indexOf(key); if(i<0) return null; return {pop:W.pop[i],temp:Math.round(W.temp[i]),code:W.code[i]}; }
function sunMin(dateStr){ const W=curWX(); if(!W||!W.sun||!W.sun.date) return null; const i=W.sun.date.indexOf(dateStr); if(i<0) return null;
  const m=s=>{ const t=(s||"").slice(11,16); if(!t) return null; return hmToMin(t); }; const rise=m(W.sun.rise[i]), set=m(W.sun.set[i]); return (rise!=null&&set!=null)?{rise,set}:null; }
function wxIcon(code){ if(code==null) return ["🌡️","날씨"]; if(code===0) return ["☀️","맑음"]; if(code<=3) return ["⛅","구름"]; if(code<=48) return ["🌫️","안개"]; if(code<=67) return ["🌧️","비"]; if(code<=77) return ["🌨️","눈"]; if(code<=82) return ["🌧️","소나기"]; return ["🌧️","비"]; }
function moodClass(code,atMin){ const s=sunMin(curDate()); const night=s?(atMin>=s.set||atMin<s.rise):(atMin>=19*60||atMin<6*60); if(night) return "night"; if(code==null) return "cloud"; if(code===0) return "clear"; if(code>=51) return "rain"; return "cloud"; }

/* 길게 눌러 드래그 순서변경 (타임라인) */
let DND=null; const LP=480, SLOP=10;
function bindTimelineDnD(){ document.querySelectorAll(".wrap .tl-item[data-pid]").forEach(row=>row.addEventListener("pointerdown",dndDown)); }
function dndDown(e){ if(e.button>0) return; if(e.target.closest(".tl-acts,.move,button,a,.tl-time")) return;
  const row=e.currentTarget; DND={row,pid:row.dataset.pid,x0:e.clientX,y0:e.clientY,ptr:e.pointerId,armed:false,ghost:null,drop:null,timer:setTimeout(()=>dndArm(),LP)};
  row.addEventListener("pointermove",dndMove,{passive:false}); row.addEventListener("pointerup",dndUp); row.addEventListener("pointercancel",dndUp); }
function dndArm(){ if(!DND) return; DND.armed=true; try{getSelection().removeAllRanges();}catch(_){} if(navigator.vibrate) try{navigator.vibrate(12);}catch(_){}
  document.body.classList.add("dnd-active"); const row=DND.row,r=row.getBoundingClientRect(); try{row.setPointerCapture(DND.ptr);}catch(_){}
  const g=row.cloneNode(true); g.className="tl-item dnd-ghost"; g.style.width=r.width+"px"; DND.offX=DND.x0-r.left; DND.offY=DND.y0-r.top; DND.ghost=g; document.body.appendChild(g); dndGhostMove(DND.x0,DND.y0); row.classList.add("dragging"); }
function dndGhostMove(x,y){ if(DND&&DND.ghost) DND.ghost.style.transform="translate("+(x-DND.offX)+"px,"+(y-DND.offY)+"px)"; }
function dndMove(e){ if(!DND) return;
  if(!DND.armed){ if(Math.hypot(e.clientX-DND.x0,e.clientY-DND.y0)>SLOP){ clearTimeout(DND.timer); dndCleanup(); } return; }
  e.preventDefault(); dndGhostMove(e.clientX,e.clientY); dndUpdateDrop(e.clientY);
  const m=70; if(e.clientY<m) document.scrollingElement.scrollBy(0,-12); else if(e.clientY>innerHeight-m) document.scrollingElement.scrollBy(0,12); }
function dndUpdateDrop(y){ document.querySelectorAll(".drop-line").forEach(d=>d.remove());
  const cands=[...document.querySelectorAll(".wrap .tl-item[data-pid]")].filter(r=>r!==DND.row); let tgt=null,before=true;
  for(const r of cands){ const rr=r.getBoundingClientRect(); if(y<rr.top+rr.height/2){ tgt=r; before=true; break; } }
  if(!tgt&&cands.length){ tgt=cands[cands.length-1]; before=false; }
  if(tgt){ const line=document.createElement("div"); line.className="drop-line"; tgt.parentNode.insertBefore(line, before?tgt:tgt.nextSibling); DND.drop={pid:tgt.dataset.pid,before}; } else DND.drop=null; }
function dndUp(e){ if(!DND) return; clearTimeout(DND.timer); if(DND.armed){ if(e&&e.preventDefault) e.preventDefault(); dndCommit(); } dndCleanup(); }
function dndCommit(){ const arr=TRIP.days[curDay].places, from=arr.findIndex(p=>p.id===DND.pid); if(from<0) return; let to=arr.length-1;
  if(DND.drop){ const ti=arr.findIndex(p=>p.id===DND.drop.pid); to=DND.drop.before?ti:ti+1; }
  const [it]=arr.splice(from,1); if(to>from) to--; to=Math.max(0,Math.min(to,arr.length)); arr.splice(to,0,it); save(); render(); toast("순서 변경됨"); }
function dndCleanup(){ if(!DND) return; const row=DND.row;
  if(row){ row.removeEventListener("pointermove",dndMove); row.removeEventListener("pointerup",dndUp); row.removeEventListener("pointercancel",dndUp); try{row.releasePointerCapture(DND.ptr);}catch(_){} row.classList.remove("dragging"); }
  if(DND.ghost) DND.ghost.remove(); document.querySelectorAll(".drop-line").forEach(d=>d.remove()); document.body.classList.remove("dnd-active"); DND=null; }

/* ✨ 최적 코스: 맛집을 끼니시간에 자동배정 + 볼거리를 가까운 순으로 끼워넣어 동선 최소화(끼니 시간순 보존 2-opt) */
const MO={breakfast:0,lunch:1,dinner:2};
function mealLabel(m){ return m==="breakfast"?"아침":m==="lunch"?"점심":m==="dinner"?"저녁":""; }
function mealOn(m){ return !(TRIP.mealOn&&TRIP.mealOn[m]===false); }
function mealTime(m){ if(!mealOn(m)) return null; return (TRIP.meal&&TRIP.meal[m])||(m==="breakfast"?"08:00":m==="lunch"?"12:00":"18:00"); }
function _d(a,b){ return (a&&b&&a.lat&&b.lat)?haversine(a,b):0; }
function routeCost(route,start,end){ let c=0,prev=start; for(const p of route){ if(prev)c+=_d(prev,p); prev=p; } if(end&&prev)c+=_d(prev,end); return c; }
function nnRoute(items,start){ const left=items.slice(),out=[]; let cur=start; if(!cur){ cur=left.shift(); if(cur)out.push(cur); } while(left.length){ let bi=0,bd=Infinity; for(let i=0;i<left.length;i++){ const d=_d(cur,left[i]); if(d<bd){bd=d;bi=i;} } cur=left.splice(bi,1)[0]; out.push(cur); } return out; }
function orderSeg(items,from,to){ let r=nnRoute(items,from);   // 양 끝(끼니) 고정 2-opt로 구간 내부 동선 최소화
  if(r.length>1&&r.length<=10){ let improved=true,g=0;
    while(improved&&g++<60){ improved=false;
      for(let i=0;i<r.length-1;i++)for(let j=i+1;j<r.length;j++){ const cand=r.slice(0,i).concat(r.slice(i,j+1).reverse(),r.slice(j+1));
        if(routeCost(cand,from,to)<routeCost(r,from,to)-1e-9){ r=cand; improved=true; } } } }
  return r; }
function autoAssignMeals(places){ const eats=places.filter(p=>p.type==="eat"); const taken={}; eats.forEach(p=>{ if(p.meal)taken[p.meal]=true; });
  const untag=eats.filter(p=>!p.meal&&!p.anchor); const pri=["lunch","dinner","breakfast"].filter(s=>!taken[s]&&mealOn(s));
  untag.forEach((p,i)=>{ if(i<pri.length) p.meal=pri[i]; }); }
function optimizeDay(di,silent){
  const dd=(di==null)?curDay:di;
  const day=TRIP.days[dd]; if(!day) return; if(day.places.length<2){ if(!silent) toast("장소를 2개 이상 넣어야 정리해요"); return; }
  if(!silent) snapshot();
  autoAssignMeals(day.places);
  const withC=day.places.filter(p=>p.lat), noC=day.places.filter(p=>!p.lat);
  const start=(dd>0&&TRIP.days[dd-1].stay&&TRIP.days[dd-1].stay.lat)?TRIP.days[dd-1].stay:((dd===0&&TRIP.arrival&&TRIP.arrival.lat)?TRIP.arrival:null);
  const end=(day.stay&&day.stay.lat)?day.stay:null;
  const dayStart=hmToMin(day.start)??600;
  const anchored=withC.filter(p=>p.type==="eat"&&p.meal&&MO[p.meal]!=null&&mealTime(p.meal)!=null).map(p=>({p,t:hmToMin(mealTime(p.meal))||0})).sort((a,b)=>a.t-b.t);

    const segs=[];
    for(let k=0;k<=n;k++){
      const prevT = k===0?dayStart : anchored[k-1].t+70;
      const nextT = k===n? Math.max(dayStart+780, anchored[n-1].t+200) : anchored[k].t;
      const refPrev = k===0?(start||anchored[0].p):anchored[k-1].p;
      const refNext = k===n?(end||anchored[n-1].p):anchored[k].p;

    for(let k=0;k<=n;k++){ const sg=segs[k]; const from=sg.from||(route.length?route[route.length-1]:sg.refPrev); const to=(k<n?anchored[k].p:end); route=route.concat(orderSeg(sg.items,from,to)); if(k<n) route.push(anchored[k].p); }

function distributeWish(){

  const k=Math.max(1,Math.min(daysCount(),pts.length));
  /* k-means: farthest-point 시드 → 8회 반복 → 하루 정원 밸런싱 */
  const seeds=[pts[0]]; while(seeds.length<k){ let best=null,bd=-1; pts.forEach(p=>{ const d=Math.min(...seeds.map(c=>_d(p,c))); if(d>bd){bd=d;best=p;} }); seeds.push(best); }
  let C=seeds.map(c=>({lat:c.lat,lng:c.lng})), asg=new Array(pts.length).fill(0);
  for(let it=0;it<8;it++){
    pts.forEach((p,i)=>{ let bi=0,bd=1e18; C.forEach((c,ci)=>{ const d=_d(p,c); if(d<bd){bd=d;bi=ci;} }); asg[i]=bi; });

    const g=groups[oi]; let fi=0,fd=-1; g.forEach((p,i)=>{ const d=_d(p,C[oi]); if(d>fd){fd=d;fi=i;} });
    const p=g.splice(fi,1)[0]; let bi=-1,bd=1e18;
    groups.forEach((g2,ci)=>{ if(ci!==oi&&g2.length<cap){ const d=_d(p,C[ci]); if(d<bd){bd=d;bi=ci;} } });
    if(bi<0){ g.push(p); break; } groups[bi].push(p); }

  ordered.forEach((g,di)=>{ const day=TRIP.days[Math.min(di,daysCount()-1)]; g.forEach(w=>day.places.push(wishToPlace(w))); });

/* 지도 색·클릭·라벨은 SIDO2REGION(9개 도, 남/북 분리) 사용 */
function buildKMapPaths(j){
  let mnL=1e9,mxL=-1e9,mnT=1e9,mxT=-1e9; const polys=[];
  j.features.forEach(f=>{ const macro=SIDO2REGION[f.properties.name]; if(!macro) return; const g=f.geometry; const ps=g.type==="Polygon"?[g.coordinates]:g.coordinates;
    ps.forEach(poly=>{ const ring=poly[0]; ring.forEach(c=>{ if(c[0]<mnL)mnL=c[0]; if(c[0]>mxL)mxL=c[0]; if(c[1]<mnT)mnT=c[1]; if(c[1]>mxT)mxT=c[1]; }); polys.push({macro,ring}); }); });
  const midLat=(mnT+mxT)/2, kx=Math.cos(midLat*Math.PI/180), eLon=(mxL-mnL)*kx, latSpan=(mxT-mnT);
  const H=350,pad=8,iH=H-2*pad,W=Math.round(iH*(eLon/latSpan))+2*pad;
  const proj=(lng,lat)=>[pad+((lng-mnL)*kx)/eLon*iH, pad+(mxT-lat)/latSpan*iH];
  const entries=[],lab={};
  polys.forEach(({macro,ring})=>{
    const pts=ring.map(c=>proj(c[0],c[1])); const out=[pts[0]];
    for(let i=1;i<pts.length;i++){ const a=out[out.length-1],b=pts[i]; if(Math.hypot(b[0]-a[0],b[1]-a[1])>=1.1) out.push(b); }
    if(out.length<5) return;
    let x0=1e9,x1=-1e9,y0=1e9,y1=-1e9,mx=0,my=0; out.forEach(p=>{x0=Math.min(x0,p[0]);x1=Math.max(x1,p[0]);y0=Math.min(y0,p[1]);y1=Math.max(y1,p[1]);mx+=p[0];my+=p[1];});
    if((x1-x0)<3&&(y1-y0)<3) return;
    const area=(x1-x0)*(y1-y0); if(!lab[macro]||area>lab[macro].a) lab[macro]={a:area,x:mx/out.length,y:my/out.length};
    entries.push({macro,d:"M"+out.map(p=>p[0].toFixed(1)+","+p[1].toFixed(1)).join("L")+"Z"});
  });
  return {entries,labels:Object.keys(lab).map(m=>({macro:m,x:lab[m].x,y:lab[m].y})),W,H};
}

/* 🏞️ 한국관광공사 TourAPI(KorService2) — 놀거리·명소 공식 데이터(사진·소개). 브라우저 직접호출 CORS OK */
function tourTypeLabel(c){ return ({12:"관광지",14:"문화시설",15:"축제·공연",25:"여행코스",28:"레포츠",32:"숙박",38:"쇼핑",39:"음식점"})[c]||"관광"; }
function tourSee(lat,lng,radius,ct,lim){ radius=radius||4000; lim=lim||14;
  const u=`https://apis.data.go.kr/B551011/KorService2/locationBasedList2?serviceKey=${encodeURIComponent(TOUR_KEY)}&numOfRows=100&pageNo=1&MobileOS=ETC&MobileApp=dongseoni&_type=json&mapX=${lng}&mapY=${lat}&radius=${radius}&arrange=E`+(ct?`&contentTypeId=${ct}`:"");
  const parse=j=>{
    let it=j&&j.response&&j.response.body&&j.response.body.items&&j.response.body.items.item; if(!it) return [];
    if(!Array.isArray(it)) it=[it];
    const KEEP={12:1,14:1,25:1,28:1};   /* 관광지·문화·코스·레포츠. ⚠️행사(15)는 제외 — 이 엔드포인트는 날짜를 몰라 지난 행사가 섞임 → tourFest(날짜 인지)로 분리 */
    return it.filter(x=>(ct?true:KEEP[+x.contenttypeid])&&x.mapx&&x.mapy).slice(0,lim).map(x=>({
      name:x.title, cat:tourTypeLabel(+x.contenttypeid), ct:+x.contenttypeid, x:x.mapx, y:x.mapy,

const SIDO_AC=[["서울",37.5665,126.9780,1],["인천",37.4563,126.7052,2],["대전",36.3504,127.3845,3],["대구",35.8714,128.6014,4],["광주",35.1595,126.8526,5],["부산",35.1796,129.0756,6],["울산",35.5384,129.3114,7],["세종",36.4801,127.2890,8],["경기",37.4138,127.5183,31],["강원",37.8228,128.1555,32],["충북",36.6357,127.4917,33],["충남",36.5184,126.8000,34],["경북",36.4919,128.8889,35],["경남",35.4606,128.2132,36],["전북",35.7175,127.1530,37],["전남",34.8679,126.9910,38],["제주",33.4890,126.4983,39]];

function tourFest(lat,lng,from,to){

  /* ⚠️areaCode 필터 금지 — DB에 지역코드 누락이 많아 부산 행사(록페스티벌 등)도 부산 코드 조회에서 빠짐(실측). 전국 조회 + 좌표 거리 필터가 정답 */
  const u=`https://apis.data.go.kr/B551011/KorService2/searchFestival2?serviceKey=${encodeURIComponent(TOUR_KEY)}&numOfRows=500&pageNo=1&MobileOS=ETC&MobileApp=dongseoni&_type=json&arrange=A&eventStartDate=${from}`;

      .slice(0,30).map(o=>{ const x=o.x; return { name:x.title, cat:(x.eventstartdate<=from?"진행 중":"예정"), ct:15, period:md(x.eventstartdate)+"–"+md(x.eventenddate),

function kakaoPlayFame(region,c){   /* 카카오 키워드검색 정확도순 = 유명도 프록시(맛집과 동일 신호) */

  const rid=String(id||"").replace(/\D/g,""); if(!rid) return Promise.resolve(null);
  const c=STARS[rid]; if(c && (Date.now()-c.t)<6048e5) return Promise.resolve(c);   /* 7일 캐시 */
  if(jinaDead) return Promise.resolve(c||null);
  return fetch("https://r.jina.ai/https://place.map.kakao.com/"+rid)
    .then(r=>r.ok?r.text():Promise.reject(r.status))
    .then(txt=>{ let rating=null,reviews=null;
      const at=txt.indexOf("place.map.kakao.com/"+rid);           /* 이 장소 링크 주변(같은 카드)에서만 추출 → 다른 가게 값 혼입 방지 */
      const win=at>=0?txt.slice(Math.max(0,at-220),at+40):txt;
      const rm=win.match(/별점\s*([0-5](?:\.[0-9])?)/)||win.match(/([0-5]\.[0-9])\s*점/)||win.match(/★\s*([0-5](?:\.[0-9])?)/);
      if(rm) rating=parseFloat(rm[1]);
      const vm=win.match(/후기\s*([\d,]+)\s*개?/)||win.match(/리뷰\s*([\d,]+)/);
      if(vm) reviews=parseInt(vm[1].replace(/,/g,""),10);
      jinaFails=0; const o={rating,reviews,t:Date.now()}; STARS[rid]=o; saveStars(); return o; })
    .catch(()=>{ if(++jinaFails>=4) jinaDead=true; return c||null; }); }
function enrichStars(list){
  if(!ADMIN||!list||list._starTried) return; list._starTried=true;
  const targets=list.filter(p=>String(p.url||"").includes("place.map.kakao.com"))
    .sort((a,b)=>(b.score||0)-(a.score||0)).slice(0,20);
  if(!targets.length||jinaDead){ list._starDone=true; return; }
  Promise.all(targets.map(p=>fetchStar(p.id).then(s=>{ if(s){ if(s.rating!=null) p.rating=s.rating; if(s.reviews!=null) p.reviews=s.reviews; } }).catch(()=>{})))
    .then(()=>{ list._starDone=true; if(RLIST&&RLIST.list===list) rerenderRec(); }); }
function kakaoRec(region,kind){
  const c=areaCoords(region); if(!window.kakao) return Promise.resolve({list:[],err:"load"});
  const ps=new kakao.maps.services.Places(), loc=new kakao.maps.LatLng(c.lat,c.lng), OK=kakao.maps.services.Status.OK, ERR=kakao.maps.services.Status.ERROR;
  if(kind!=="eat"){ return new Promise(res=>{ let all=[],done=0,errored=0;
    ["AT4","CT1"].forEach(code=>{ ps.categorySearch(code,(data,st)=>{
      if(st===OK) all=all.concat(data.map(d=>({id:idOf(d.place_url),name:d.place_name,cat:(d.category_name||"").split(">").pop().trim(),dist:+d.distance||null,url:d.place_url,x:d.x,y:d.y,score:Math.max(0,100000-(+d.distance||50000)),_why:[]})));
      else if(st===ERR) errored++;
      if(++done===2){ all.sort((x,y)=>(+x.dist||9e9)-(+y.dist||9e9)); res({list:all.slice(0,12),err:(all.length===0&&errored>0)?"auth":null}); }
    },{location:loc,radius:2500,sort:kakao.maps.services.SortBy.DISTANCE}); }); }); }
  return new Promise(res=>{
    const cand={}, distMap={}; let done=0,errored=0;
    const N=9;   /* 맛집×3p + 노포×2p + 카페×1p + FD6×2p + CE7×1p — 후보 풀 ~135 */
    const finish=()=>{ if(++done<N) return;
      const arr=Object.values(cand), nk={}; arr.forEach(p=>{ nk[p.nameKey]=(nk[p.nameKey]||0)+1; });
      const scored=arr.map(p=>{
        if(p.catCode && p.catCode!=="FD6" && p.catCode!=="CE7") return null;
        const lname=p.name.toLowerCase(); if(CHAIN.some(ch=>lname.includes(ch))) return null;
        if(nk[p.nameKey]>=2) return null;
        const dist=distMap[p.id]!=null?distMap[p.id]:Math.round(haversine(c,{lat:+p.y,lng:+p.x})*1000);
        let s=Math.max(0,100-p.bestRank*5); const why=[];
        if(p.bestRank<=2) why.push("인기");
        if(p.appears>=2){ s+=25; why.push("교차"); }
        s += ((p.catName.match(/>/g)||[]).length)*8;
        if(GENERIC_CAT.test(p.cat)) s-=20;
        if(LOCAL_KW.test(p.name)){ s+=30; why.push("노포"); }
        if(/(본점|원조|\d대|할매|할머니)/.test(p.name)) s+=12;
        s += Math.max(0,12-dist/250);
        return {id:p.id,name:p.name,cat:p.cat,cuisine:p.cuisine,url:p.url,x:p.x,y:p.y,dist,score:s,_why:why};
      }).filter(Boolean);
      scored.sort((a,b)=>b.score-a.score);
      res({list:scored.slice(0,30),err:scored.length?null:(errored?"auth":"empty")});
    };
    const mk=(d,rank)=>({id:idOf(d.place_url),name:d.place_name,cat:(d.category_name||"").split(">").pop().trim(),catName:d.category_name||"",catCode:d.category_group_code||"",cuisine:cuisineOf(d),url:d.place_url,x:d.x,y:d.y,nameKey:nameKey(d.place_name),bestRank:rank,appears:0});
    const kwF=(q,page)=>ps.keywordSearch(q,(data,st)=>{
      if(st===OK) data.forEach((d,i)=>{ const gr=(page-1)*15+i; const id=idOf(d.place_url); const e=cand[id]||(cand[id]=mk(d,gr)); e.bestRank=Math.min(e.bestRank,gr); e.appears++; });
      else if(st===ERR) errored++; finish();
    },{location:loc,radius:2200,size:15,page,sort:kakao.maps.services.SortBy.ACCURACY});
    const catF=(code,page)=>ps.categorySearch(code,(data,st)=>{
      if(st===OK) data.forEach((d,i)=>{ const id=idOf(d.place_url); distMap[id]=d.distance?+d.distance:null;
        if(!cand[id]){ const e=mk(d,60+(page-1)*15+i); e.appears=1; cand[id]=e; } });   /* 카테고리 결과도 후보로(낮은 등수) — 후보군 확대 */
      else if(st===ERR) errored++; finish();
    },{location:loc,radius:2200,size:15,page,sort:kakao.maps.services.SortBy.DISTANCE});
    kwF(region+" 맛집",1); kwF(region+" 맛집",2); kwF(region+" 맛집",3);
    kwF(region+" 노포",1); kwF(region+" 노포",2); kwF(region+" 카페",1);
    catF("FD6",1); catF("FD6",2); catF("CE7",1);
  });
}

  KAKAO_KEY=localStorage.getItem("dongseoni_kakao")||DEFAULT_KAKAO; ODSAY_KEY=localStorage.getItem("dongseoni_odsay")||DEFAULT_ODSAY; TOUR_KEY=localStorage.getItem("dongseoni_tour")||DEFAULT_TOUR; GEMINI_KEY=localStorage.getItem("dongseoni_gemini")||DEFAULT_GEMINI; ADMIN=localStorage.getItem("dongseoni_admin")==="1"; if(KAKAO_KEY) loadKakao();
  loadKoreaMap().then(km=>{KMAP=km;}).catch(()=>{}); loadCities(); probeOdsay();
  const hasData=TRIP.days.some(d=>d.places.length>0||d.stay)||TRIP.arrival;
  onbDone=localStorage.getItem("dongseoni_onb")==="1"||hasData;
  const off=Math.round((new Date(todayStr())-new Date(TRIP.startDate))/86400000); curDay=(off>=0&&off<daysCount())?off:0;
  screen=hasData?"home":"edit"; setTab(screen,false); render();
  if(_recvLater||(_share&&_share.kind==="trip")) setTimeout(()=>openRecvSheet(_recvLater||_share.trip),500);
  else if(_share&&_share.text) setTimeout(()=>{ openImport(); setTimeout(()=>{ const te=document.getElementById("impText"),ue=document.getElementById("impUrl");
    const body=_share.text.replace(/https?:\/\/[^\s]+/g,"").trim();   /* URL 걷어낸 실제 본문 길이로 판단 */
    if(ue&&_share.url) ue.value=_share.url;
    if(te&&(!_share.url||body.length>=120)) te.value=_share.text;   /* URL 공유면 주소칸만(본문칸이 우선이라 둘 다 채우면 블로그를 안 읽음) */
    toast("공유받은 내용을 넣어뒀어요 — ‘분석하기’를 누르세요"); },80); },500);
  const c=cityObj(); await ensureWeather(c.lat,c.lng); lastSkyMood=null; lastMascot=""; render();
})();
setInterval(()=>{ if(screen==="home"&&simMinutes==null&&document.getElementById("clkT")) applySim(); },30000);
if("serviceWorker" in navigator){ window.addEventListener("load",()=>navigator.serviceWorker.register("./sw.js").catch(()=>{})); }
let deferredPrompt=null;
function installDismiss(){ const b=document.querySelector(".a2hs"); if(b)b.remove(); try{localStorage.setItem("dongseoni_a2hs","1");}catch(e){} }
function isStandalone(){ return navigator.standalone===true||(window.matchMedia&&matchMedia("(display-mode: standalone)").matches); }
function showInstallBar(kind){ try{
  if(localStorage.getItem("dongseoni_a2hs")==="1"||isStandalone()||document.querySelector(".a2hs")) return;
  const d=document.createElement("div"); d.className="a2hs";
  if(kind==="android"){ d.innerHTML='<span><b>동선이</b>를 홈 화면에 설치하세요</span><button class="ins">설치</button><button class="cls" aria-label="닫기">✕</button>';
    d.querySelector(".ins").onclick=async()=>{ if(deferredPrompt){ deferredPrompt.prompt(); try{await deferredPrompt.userChoice;}catch(e){} deferredPrompt=null; } installDismiss(); };
  } else { d.innerHTML='<span><b>공유</b> → <b>홈 화면에 추가</b>로 앱처럼 쓰세요</span><button class="cls" aria-label="닫기">✕</button>'; }
  d.querySelector(".cls").onclick=installDismiss; document.body.appendChild(d);
}catch(e){} }
/* 안드로이드/데스크톱 크롬: 실제 설치 프롬프트를 잡아 '설치' 버튼으로 노출 */
window.addEventListener("beforeinstallprompt",e=>{ e.preventDefault(); deferredPrompt=e; showInstallBar("android"); });
window.addEventListener("appinstalled",()=>{ deferredPrompt=null; installDismiss(); });
/* iOS Safari: 설치 프롬프트 API가 없어 수동 추가 안내(1회) */
function maybeInstallHint(){ try{
  if(isStandalone()) return; const ua=navigator.userAgent||"";
  const ios=/iPhone|iPod|iPad/.test(ua)||(navigator.platform==="MacIntel"&&navigator.maxTouchPoints>1);
  const safari=/Safari/.test(ua)&&!/CriOS|FxiOS|EdgiOS|OPiOS/.test(ua);
  if(ios&&safari) setTimeout(()=>showInstallBar("ios"),2600);
}catch(e){} }
maybeInstallHint();
window.addEventListener("hashchange",()=>{ const t=hashTrip(); if(t && encodeTrip(t)!==encodeTrip(TRIP)) openRecvSheet(t); });   /* 수락=새 여행 추가, 거절=내 여행 유지(덮어쓰기 버그 수정) */
</script>
